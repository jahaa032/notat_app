<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoteIfy</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Noteify</h1>
        <p>Notes so You Don't Forget</p>
      </header>
    </div>

    <div class="controls">
      <div class="controls-container">
        <input
          type="text"
          id="SerchInput"
          placeholder="Search Notes ..."
          class="search-input"
        />
        <div class="filter-group">
          <select id="filterSelect" class="filter-select">
            <option value="all">All Notes</option>
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="ideas">Ideas</option>
            <option value="reminders">Reminders</option>
          </select>
          <button id="addNoteBtn" class="add-btn">
            <i class="addNote"></i> Legg til
          </button>
        </div>
      </div>
    </div>
    <div id="notesContainer" class="notes-grid">
        <!--Noter skal bli lagt til her-->
    </div>
    <div id="emptyState" class="empty-state"></div>
    <i class="fas fa-notes-medical"></i>
    <h3>Ingen Notater</h3>
    <p>Legg til din første notat med å trykke "Legg til" knappen</p>

    <script src="js/index.js"></script>
  </body>
</html>
