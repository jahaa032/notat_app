<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoteIfy</title>
    <link rel="stylesheet" href="./css/style.css"/>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Noteify</h1>
        <p>Notes so You Don't Forget</p>
      </header>
    </div>
    <!-- controls for app -->
    <div class="controls">
      <div class="controls-container">
        <input
          type="text"
          id="searchInput"
          placeholder="Search Notes ..."
          class="search-input"
        />
        <div class="filter-group">
          <select id="filterSelect" class="filter-select">
            <option value="all">All Notes</option>
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="ideas">Ideas</option>
            <option value="reminders">Reminders</option>
          </select>

          <button id="openModalBtn" class="add-btn">+ Legg til notat</button>
        </div>
      </div>
    </div>
    <div id="notesContainer" class="notes-grid">
      <!--Noter skal bli lagt til her-->
    </div>
    <div id="emptyState" class="empty-state">
      <i class="fas fa-notes-medical"></i>
      <h3>Ingen Notater</h3>
      <p>Legg til din første notat med å trykke "Legg til" knappen</p>
    </div>

    <!-- ADD NOTE MODAL -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <h2>New Note</h2>

        <input id="tittelInput" placeholder="Tittel" />
        <textarea id="bodyInput" placeholder="Body"></textarea>

        <div class="modal-buttons">
          <button id="saveNoteBtn">Save</button>
          <button id="closeModalBtn">Cancel</button>
        </div>
      </div>
    </div>
    <div class="container">
      <header class="header">
        <h1>ToDoify</h1>
        <h2>So you remember what to do at any time!</h2>
      </header>
    </div>
    <div class="control">
      <div class="controls-container">
        <input
          type="text"
          id="searchInput"
          placeholder="Search Notes ..."
          class="search-input"
        />
        <div class="filter-group">
          <button id="openModalBtn" class="add-btn">+ Legg til todo</button>
        </div>
      </div>
    </div>
    <script src="./js/index.js"></script>
  </body>
</html>
