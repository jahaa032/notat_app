<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noteify</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <!-- Main app content -->
  <main class="app">
    <!-- Page title and subtitle -->
    <header class="page-header">
      <h1>Noteify</h1>
      <p>Notes and todos in Perfect Harmony</p>
    </header>

    <!-- Notes panel -->
    <section class="panel">
      <div class="panel-header">
        <h2>Notes</h2>
        <button id="openModalBtn" class="btn">Legg til ny Notat</button>
      </div>

      <!-- Notes are rendered here by JavaScript -->
      <div id="notesContainer" class="items-grid"></div>
    </section>

    <!-- Todos panel -->
    <section class="panel">
      <div class="panel-header">
        <h2>Todos</h2>
      </div>

      <!-- Folder creation controls -->
      <div class="folder-form">
        <input id="folderInput" placeholder="Ny mappe (eksempel: Kjøpe liste)">
        <button id="addFolderBtn" class="btn btn-accent">Legg til ny mappe</button>
      </div>

      <!-- Todos/folders are rendered here by JavaScript -->
      <div id="todosContainer" class="items-grid"></div>
    </section>
  </main>

  <!-- Note modal (used for both add and update) -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h3 id="noteModalTitle">Legg til Notat</h3>
      <input id="tittelInput" placeholder="Title">
      <textarea id="bodyInput" placeholder="Body"></textarea>
      <div class="modal-actions">
        <button id="saveNoteBtn" class="btn">Save</button>
        <button id="closeModalBtn" class="btn btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <script src="./js/frontend.js"></script>
</body>
</html>
